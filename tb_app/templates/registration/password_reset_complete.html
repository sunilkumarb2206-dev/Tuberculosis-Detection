<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TB SCAN AI &bull; Password Reset Complete</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-dark: #0b1329;
        --panel-dark: #111a2e;
        --border-clr: #1e293b;
        --teal-glow: #00f2fe;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }
      body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        font-family: "Segoe UI", Tahoma, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .box {
        width: 100%;
        max-width: 380px;
        background: var(--panel-dark);
        padding: 35px;
        border-radius: 12px;
        border: 1px solid var(--border-clr);
        text-align: center;
        box-sizing: border-box;
      }
      h2 {
        color: var(--teal-glow);
        margin-top: 0;
        margin-bottom: 20px;
      }
      p {
        font-size: 13px;
        color: var(--text-muted);
      }
      a {
        color: var(--teal-glow);
        text-decoration: none;
        font-weight: 600;
        display: inline-block;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>
        <i class="fa-solid fa-circle-check"></i> Password Reset Successful
      </h2>
      <p>Your password has been set. You may go ahead and log in now.</p>
      <a href="{% url 'login' %}">Sign In Now</a>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TB SCAN AI &bull; Enter New Password</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-dark: #0b1329;
        --panel-dark: #111a2e;
        --border-clr: #1e293b;
        --teal-glow: #00f2fe;
        --teal-dim: #0284c7;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }
      body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        font-family: "Segoe UI", Tahoma, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .box {
        width: 100%;
        max-width: 380px;
        background: var(--panel-dark);
        padding: 35px;
        border-radius: 12px;
        border: 1px solid var(--border-clr);
        box-sizing: border-box;
      }
      h2 {
        color: var(--teal-glow);
        margin-top: 0;
        text-align: center;
        margin-bottom: 20px;
      }
      input {
        width: 100%;
        padding: 11px 14px;
        background: var(--bg-dark);
        color: #fff;
        border: 1px solid var(--border-clr);
        border-radius: 6px;
        box-sizing: border-box;
        margin-bottom: 15px;
        font-size: 14px;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: var(--teal-dim);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn:hover {
        background: var(--teal-glow);
        color: var(--bg-dark);
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2><i class="fa-solid fa-lock"></i> Set New Password</h2>
      {% if validlink %}
      <form method="POST">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit" class="btn">Change Password</button>
      </form>
      {% else %}
      <p style="font-size: 13px; color: #ef4444; text-align: center">
        The password reset link was invalid, possibly because it has already
        been used. Please request a new password reset.
      </p>
      {% endif %}
    </div>
  </body>
</html>
